name: burncheck
description: "A new Burncheck project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  http: ^1.6.0
  geolocator: ^14.0.2
  sphere_maps_flutter: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo/
    - assets/images/svg/
    - assets/images/png/
    - assets/images/png/pm25_gain/

  fonts:
    - family: Kanit
      fonts:
        - asset: assets/fonts/Kanit-Regular.ttf
